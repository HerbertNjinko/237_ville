services:
  - type: web
    name: organization-237
    runtime: node
    plan: free
    repo: https://github.com/HerbertNjinko/237_ville
    branch: dev
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://organization237.njinkofarm.com
      - key: DATABASE_URL
        fromDatabase:
          name: organization-237-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_TEMPORARY_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: 237 Ville Admin
      - key: ADMIN_FIRST_NAME
        value: 237
      - key: ADMIN_LAST_NAME
        value: Ville Admin
      - key: REGISTRATION_FEE_CENTS
        value: "5000"
      - key: POLICY_TITLE
        value: 237 Ville Member Policy
      - key: POLICY_VERSION
        value: "2026-05-06"
      - key: SMTP_ENABLED
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_STARTTLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        value: 237 Ville
      - key: SMTP_REPLY_TO
        sync: false
      - key: DWOLLA_ENABLED
        value: "false"
      - key: DWOLLA_ENVIRONMENT
        value: sandbox
      - key: DWOLLA_KEY
        sync: false
      - key: DWOLLA_SECRET
        sync: false
      - key: DWOLLA_WEBHOOK_SECRET
        sync: false

databases:
  - name: organization-237-db
    plan: free
    postgresMajorVersion: "16"
    databaseName: organization_237
    user: organization_237_user
